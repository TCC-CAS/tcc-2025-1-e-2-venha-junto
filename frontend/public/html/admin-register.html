<!doctype html>
<html lang="pt-br">
<head><style>html,body{background:#f6f8fc!important}</style>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Venha Junto • Admin • Cadastro</title>

  <link rel="stylesheet" href="../css/parceiro-cadastro.css" />
  <style>
    :root {
      --primary: #111827;
      --accent: #ea580c;
      --bg: #f8fafc;
    }
    body { 
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .wrap {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;
      position: relative;
    }
    /* Subtle background circles for depth */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.4;
    }
    .circle-1 { width: 400px; height: 400px; background: #ea580c; top: -100px; right: -100px; }
    .circle-2 { width: 300px; height: 300px; background: #111827; bottom: -50px; left: -50px; }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      padding: 40px;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .top {
      text-align: center;
      margin-bottom: 32px;
    }
    .icon {
      width:64px; height:64px; display:flex; align-items:center; justify-content:center;
      border-radius: 18px; background: var(--primary); color:#fff; font-size:32px;
      margin: 0 auto 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
    }
    .title { margin:0; font-size:24px; font-weight: 800; color: #111827; letter-spacing: -0.025em; }
    .sub { margin:8px 0 0; color:#64748b; font-size:15px; }

    .field { margin-top: 20px; display:flex; flex-direction:column; gap:8px; }
    label { font-size: 14px; font-weight: 600; color:#1f2937; margin-left: 4px; }
    input {
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      transition: all 0.2s;
      background: #fff;
    }
    input:focus { 
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.1);
    }

    .actions {
      margin-top: 32px;
      display:flex;
      flex-direction: column;
      gap:16px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color:#fff;
      cursor:pointer;
      font-weight:700;
      font-size: 16px;
      transition: all 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
      filter: brightness(1.1);
    }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity:.7; cursor:not-allowed; transform: none; }
    
    .link-back {
      text-align: center;
      color:#94a3b8; font-size:14px;
    }
    .link-back a { color: var(--accent); font-weight: 700; text-decoration: none; transition: opacity 0.2s; }
    .link-back a:hover { opacity: 0.8; }

    .toast {
      margin-top: 20px;
      padding: 14px;
      border-radius: 12px;
      background: var(--primary);
      color:#fff;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .toast[hidden]{ display:none; }
    .toast.error { background: #ef4444; }
    .toast.success { background: #10b981; }
  </style>
<script>(function(d){var s = d.createElement('script');s.setAttribute('data-account', 'SEU_ID_AQUI');s.setAttribute('src', 'https://cdn.userway.org/widget.js');(d.body || d.head).appendChild(s);})(document);</script>
</head>

<body>
  <div class="wrap">
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>
    <div class="card">
      <div class="top">
        <div class="icon">🛡️</div>
        <div>
          <h1 class="title">Novo Administrador</h1>
          <p class="sub">Crie uma conta para gerenciar a plataforma.</p>
        </div>
      </div>

      <form id="formAdminRegister" novalidate>
        <div class="field">
          <label for="nome">Nome Completo</label>
          <input id="nome" name="nome" type="text" placeholder="Seu nome" required />
        </div>

        <div class="field">
          <label for="email">E-mail Administrativo</label>
          <input id="email" name="email" type="email" placeholder="admin@venhajunto.com" required />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="actions">
          <button id="btnRegister" class="btn" type="submit">Criar Conta Admin</button>
          <div class="link-back">
            Já possui acesso? <a href="./admin-login.html">Fazer Login</a>
          </div>
        </div>

        <div id="toast" class="toast" hidden></div>
      </form>
    </div>
  </div>

  <script src="../js/admin-register.js"></script>
  <script src="../js/vlibras.js" defer></script>
</body>
</html>
