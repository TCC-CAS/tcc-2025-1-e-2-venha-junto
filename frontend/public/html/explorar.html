      <main id="conteudo" class="main" role="main">
        <div class="explorar-layout">
          <!-- =======================
             SIDEBAR DE FILTROS 
        ======================== -->
          <aside class="explorar-filters" aria-label="Filtros Avançados">
            <div class="filters-head">
              <div
                style="
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  color: #0f172a;
                "
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#ea580c"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <polygon
                    points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"
                  ></polygon>
                </svg>
                <h2 style="margin: 0; font-size: 16px; font-weight: 800">
                  Filtros
                </h2>
              </div>
              <button
                id="limpar"
                class="linkbtn"
                type="button"
                style="color: #ea580c; font-size: 13px; font-weight: 700"
              >
                Limpar
              </button>
            </div>

            <div class="filters-body">
              <!-- Perto de mim -->
              <div class="filter-section">
                <label
                  style="
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    font-size: 13px;
                    color: #ea580c;
                    font-weight: 700;
                    margin-bottom: 12px;
                  "
                >
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                  </svg>
                  Perto de mim
                </label>
                <div class="distance-filter" id="distanceFilter" style="display: block;">
                  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                    <label for="raioBusca" style="font-size: 13px; color: #475569; font-weight: 600;">Distância máxima</label>
                    <span id="raioValor" style="font-size: 13px; font-weight: 700; color: #ea580c;">10 km</span>
                  </div>
                  <input type="range" id="raioBusca" min="1" max="50" step="1" value="10" style="width: 100%; accent-color: #ea580c; cursor: pointer;">
                  <div style="display: flex; justify-content: space-between; font-size: 11px; color: #94a3b8; margin-top: 4px;">
                    <span>1 km</span>
                    <span>50 km</span>
                  </div>
                </div>
              </div>

              <!-- Categoria (Sincroniza JS com select escondido) -->
              <div class="filter-section">
                <h3
                  style="
                    font-size: 13px;
                    color: #475569;
                    margin-bottom: 12px;
                    font-weight: 600;
                  "
                >
                  Categoria
                </h3>

                <!-- Select invisível para o JS já existente -->
                <select id="tipo" style="display: none">
                  <option value="Todos">Todos os tipos</option>
                  <option value="Restaurante">Restaurantes</option>
                  <option value="Cafeteria">Cafeterias</option>
                  <option value="Museu">Museus</option>
                  <option value="Centro Cultural">Centros Culturais</option>
                  <option value="Teatro">Teatros</option>
                  <option value="Cinema">Cinemas</option>
                  <option value="Parque">Parques</option>
                  <option value="Hotel">Hotéis</option>
                  <option value="Passeio">Passeios</option>
                </select>

                <div class="category-list">
                  <button class="cat-btn active" data-val="Todos">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon><line x1="9" y1="3" x2="9" y2="18"></line><line x1="15" y1="6" x2="15" y2="21"></line></svg>
                    </span> Todos
                  </button>
                  <button class="cat-btn" data-val="Restaurante">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"></path><path d="M7 2v20"></path><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Z"></path><path d="M21 15v7"></path></svg>
                    </span> Restaurantes
                  </button>
                  <button class="cat-btn" data-val="Cafeteria">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h1a4 4 0 1 1 0 8h-1"></path><path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4Z"></path><line x1="6" y1="2" x2="6" y2="4"></line><line x1="10" y1="2" x2="10" y2="4"></line><line x1="14" y1="2" x2="14" y2="4"></line></svg>
                    </span> Cafeterias
                  </button>
                  <button class="cat-btn" data-val="Museu">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10" width="4" height="10"></rect><rect x="16" y="10" width="4" height="10"></rect><polygon points="12 2 2 8 22 8 12 2"></polygon><line x1="2" y1="22" x2="22" y2="22"></line><line x1="12" y1="10" x2="12" y2="20"></line></svg>
                    </span> Museus
                  </button>
                  <button class="cat-btn" data-val="Centro Cultural">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><path d="M9 22v-4h6v4"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M12 6h.01"></path><path d="M12 10h.01"></path><path d="M12 14h.01"></path><path d="M16 10h.01"></path><path d="M16 14h.01"></path><path d="M8 10h.01"></path><path d="M8 14h.01"></path></svg>
                    </span> Centros Culturais
                  </button>
                  <button class="cat-btn" data-val="Teatro">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5h11C20 5 22 7 22 9.5v7.5z"></path><path d="M2 10h20"></path><path d="M14.5 10v9.5"></path><path d="M9.5 10v9.5"></path><path d="M6 14l3 3m0-3l-3 3"></path><path d="M18 14l-3 3m0-3l3 3"></path><path d="M2 2v3"></path><path d="M22 2v3"></path></svg>
                    </span> Teatros
                  </button>
                  <button class="cat-btn" data-val="Cinema">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
                    </span> Cinemas
                  </button>
                  <button class="cat-btn" data-val="Parque">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-8"></path><path d="M16 11V7l-4-5-4 5v5"></path><path d="M3.5 14h17l-1-7h-15l-1 7z"></path></svg>
                    </span> Parques
                  </button>
                  <button class="cat-btn" data-val="Hotel">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><circle cx="12" cy="14" r="1"></circle><path d="M12 15v7"></path><path d="M8 6h.01"></path><path d="M16 6h.01"></path><path d="M8 10h.01"></path><path d="M16 10h.01"></path></svg>
                    </span> Hotéis
                  </button>
                  <button class="cat-btn" data-val="Passeio">
                    <span class="icon">
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>
                    </span> Passeios
                  </button>
                </div>
              </div>

              <!-- Recursos -->
              <div class="filter-section" style="border-bottom: none">
                <h3
                  style="
                    font-size: 13px;
                    color: #475569;
                    margin-bottom: 14px;
                    font-weight: 600;
                  "
                >
                  Recursos de Acessibilidade
                </h3>

                <label class="check-container"
                  >Rampa de acesso
                  <input type="checkbox" id="acc-rampa" data-acc="rampa" />
                  <span class="checkmark"></span>
                </label>
                <label class="check-container"
                  >Banheiro adaptado
                  <input type="checkbox" id="acc-banheiro" data-acc="banheiro" />
                  <span class="checkmark"></span>
                </label>
                <label class="check-container"
                  >Piso tátil
                  <input type="checkbox" id="acc-piso" data-acc="piso_tatil" />
                  <span class="checkmark"></span>
                </label>
                <label class="check-container"
                  >Elevador
                  <input type="checkbox" id="acc-elevador" data-acc="elevador" />
                  <span class="checkmark"></span>
                </label>
                <label class="check-container"
                  >Estacionamento PCD
                  <input type="checkbox" id="acc-estacionamento" data-acc="estacionamento" />
                  <span class="checkmark"></span>
                </label>
                <label class="check-container"
                  >Intérprete de Libras
                  <input type="checkbox" id="acc-libras" data-acc="libras" />
                  <span class="checkmark"></span>
                </label>
              </div>

              <!-- Escondidos mas necessários pro JS não quebrar -->
              <select id="cidade" style="display: none">
                <option value=""></option>
              </select>
              <select id="estilo" style="display: none">
                <option value="Qualquer"></option>
              </select>
              <select id="orcamento" style="display: none">
                <option value="Qualquer"></option>
              </select>
            </div>
          </aside>

          <!-- =======================
             ÁREA PRINCIPAL 
        ======================== -->
          <div class="explorar-content">
            <!-- Busca na própria área direita -->
            <div class="top-search-bar">
              <span class="sicon">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#94a3b8"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
              </span>
              <input
                id="q"
                type="search"
                placeholder="Buscar local, bairro ou categoria..."
              />
              <button
                class="btn-search"
                type="button"
                onclick="
                  document.getElementById('q').dispatchEvent(new Event('input'))
                "
              >
                Buscar
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </div>

            <!-- Contador -->
            <div class="count-bar" aria-live="polite">
              <strong id="countLocais">0</strong> locais encontrados
            </div>

            <!-- Cards (grid) -->
            <div id="listaLocais" class="locais-grid" aria-live="polite"></div>
          </div>
        </div>

        <script src="../js/explorar.js" type="module"></script>
        <script>
          // Sincroniza a nova lista visual com o <select> do backend para os botões não quebrarem a filtragem original
          document.addEventListener("DOMContentLoaded", () => {
            const catBtns = document.querySelectorAll(".cat-btn");
            const selectTipo = document.getElementById("tipo");

            catBtns.forEach((btn) => {
              btn.addEventListener("click", () => {
                // tira o active de todos
                catBtns.forEach((b) => b.classList.remove("active"));
                // poe ativo no clicado
                btn.classList.add("active");
                // atualiza o select original
                if (selectTipo) {
                  selectTipo.value = btn.getAttribute("data-val");
                  // forca o evento change pra acionar o JS principal
                  selectTipo.dispatchEvent(new Event("change"));
                }
              });
            });
          });
        </script>
      </main>
    </div>

    <!-- ✅ IMPORTS (ORDEM CERTA) -->
    <script src="../js/api.js" defer></script>
    <script src="../js/userbox.js" defer></script>
    <script src="../js/vlibras.js" defer></script>
    <!-- ✅ Utils Internos -->
    <script src="../js/carousel.js" defer></script>
