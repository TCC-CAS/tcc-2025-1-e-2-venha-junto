<!doctype html>
<html lang="pt-br">
  <head><style>html,body{background:#f6f8fc!important}</style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venha Junto • Entrar</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/auth-split.css" />
  <script>(function(d){var s = d.createElement('script');s.setAttribute('data-account', 'SEU_ID_AQUI');s.setAttribute('src', 'https://cdn.userway.org/widget.js');(d.body || d.head).appendChild(s);})(document);</script>
</head>

  <body>
    <!-- Split Layout Container -->
    <div class="vj-split-layout">
      <!-- Left side: Orange Hero -->
      <div class="vj-split-left">
        <div class="vj-split-left-content">
          <h1>Bem-vindo ao Venha Junto</h1>
          <p>Turismo Acessível em São Paulo</p>
        </div>
      </div>

      <!-- Right side: White Form -->
      <div class="vj-split-right">
        <div class="vj-form-container">
          <h2 class="vj-form-title">Entrar na sua conta</h2>
          <p class="vj-form-sub">
            Insira suas credenciais para acessar a plataforma
          </p>

          <form
            id="formLogin"
            class="vj-split-form"
            autocomplete="on"
            novalidate
          >
            <!-- EMAIL -->
            <div class="vj-form-group">
              <label for="email">E-mail</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  ></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="seuemail@exemplo.com"
                  required
                />
              </div>
              <small id="emailError" class="vj-error"></small>
            </div>

            <!-- SENHA -->
            <div class="vj-form-group">
              <label for="senha">Senha</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  id="senha"
                  name="senha"
                  type="password"
                  placeholder="••••••••"
                  required
                />
                <button
                  class="vj-eye-btn"
                  type="button"
                  data-eye="senha"
                  aria-label="Mostrar/ocultar senha"
                >
                  <svg
                    width="20"
                    height="20"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <small id="senhaError" class="vj-error"></small>
            </div>

            <!-- LEMBRAR DE MIM & ESQUECI A SENHA -->
            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: 4px;
              "
            >
              <label class="vj-checkbox" style="margin: 0">
                <input type="checkbox" id="relembrar" />
                <span>Lembrar de mim</span>
              </label>
              <a
                href="./usuario-esqueci-senha.html"
                style="
                  font-size: 12px;
                  font-weight: 700;
                  color: #f97316;
                  text-decoration: none;
                "
                >Esqueci a senha</a
              >
            </div>

            <!-- BOTAO ENTRAR -->
            <button class="vj-submit-btn" type="submit">
              Entrar <span>→</span>
            </button>

            <!-- FOOTER LINK -->
            <div class="vj-form-footer">
              Não tem uma conta?
              <a href="./usuario-criar-conta.html">Cadastre-se grátis</a>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="../js/i18n.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script src="../js/api.js" defer></script>
    <script src="../js/usuario-auth-ui.js" defer></script>
    <script src="../js/vlibras.js" defer></script>
  </body>
</html>
