<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venha Junto • Criar conta parceira</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/auth-split.css" />
    <style>
      /* Main Error Styling */
      .vj-main-error {
        display: none;
        background: #fef2f2;
        color: #b91c1c;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #fca5a5;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 24px;
        align-items: center;
        gap: 10px;
      }
      /* Ajuste de Overflow e Altura Lado Esquerdo */
      .vj-split-layout {
        align-items: stretch;
      }
      .vj-split-left {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .vj-split-right {
        align-items: flex-start; /* Para evitar que o centro corte no mobile */
        padding-top: 60px;
        padding-bottom: 60px;
      }
      .vj-form-container {
        margin: auto;
      }
      .vj-main-error.show {
        display: flex;
      }

      /* Erros em campos */
      .vj-error-msg {
        display: none;
        color: #ef4444;
        font-size: 13px;
        font-weight: 600;
        margin-top: 6px;
      }
      .vj-error-msg.show {
        display: block;
      }

      .vj-input-wrapper input.invalid {
        border-color: #ef4444;
        background-color: #fef2f2;
      }

      /* Medidor de Força de Senha */
      .pwd-strength-meter {
        height: 6px;
        background: #e2e8f0;
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
        display: none;
      }
      .pwd-strength-meter div {
        height: 100%;
        width: 0;
        transition: all 0.3s ease;
      }
      .pwd-strength-text {
        font-size: 12px;
        font-weight: 700;
        margin-top: 4px;
        display: none;
      }
      .strength-weak {
        width: 33%;
        background: #ef4444;
      }
      .strength-medium {
        width: 66%;
        background: #eab308;
      }
      .strength-strong {
        width: 100%;
        background: #22c55e;
      }
    </style>
  </head>

  <body>
    <!-- Split Layout Container -->
    <div class="vj-split-layout">
      <!-- Left side: Orange Hero -->
      <div class="vj-split-left">
        <a href="./index.html" class="vj-back-btn" aria-label="Voltar ao início"
          >← Voltar ao início</a
        >
        <div class="vj-split-left-content">
          <h1>Parceria Venha Junto</h1>
          <p>
            Cadastre seu estabelecimento e alcance milhares de turistas por toda
            a cidade.
          </p>
        </div>
      </div>

      <!-- Right side: White Form -->
      <div class="vj-split-right">
        <div class="vj-form-container">
          <h2 class="vj-form-title">Criar sua conta</h2>
          <p class="vj-form-sub">Preencha os dados abaixo para começar</p>

          <form
            id="formCriarConta"
            class="vj-split-form"
            autocomplete="on"
            novalidate
          >
            <div id="mainError" class="vj-main-error">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <span id="mainErrorText">Mensagem de erro aqui</span>
            </div>

            <!-- NOME -->
            <div class="vj-form-group">
              <label for="nome">Nome completo responsável</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input
                  id="nome"
                  name="nome"
                  type="text"
                  placeholder="Seu nome completo"
                  required
                />
              </div>
              <small id="nomeError" class="vj-error-msg"></small>
            </div>

            <!-- TELEFONE -->
            <div class="vj-form-group">
              <label for="telefone">Telefone</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
                  ></path>
                </svg>
                <input
                  id="telefone"
                  name="telefone"
                  type="tel"
                  placeholder="(11) 99999-9999"
                  maxlength="15"
                />
              </div>
              <small id="telefoneError" class="vj-error-msg"></small>
            </div>

            <!-- EMAIL -->
            <div class="vj-form-group">
              <label for="email">E-mail corporativo</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  ></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="empresa@exemplo.com"
                  required
                />
              </div>
              <small id="emailError" class="vj-error-msg"></small>
            </div>

            <!-- SENHA -->
            <div class="vj-form-group">
              <label for="senha">Senha</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  id="senha"
                  name="senha"
                  type="password"
                  placeholder="Mínimo 6 caracteres"
                  minlength="6"
                  required
                />
                <button
                  class="vj-eye-btn"
                  type="button"
                  id="togglePwd"
                  aria-label="Mostrar/ocultar senha"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <div class="pwd-strength-meter" id="pwdStrengthMeter">
                <div id="pwdStrengthBar"></div>
              </div>
              <div class="pwd-strength-text" id="pwdStrengthText"></div>
              <small id="senhaError" class="vj-error-msg"></small>
            </div>

            <!-- CONFIRMAR SENHA -->
            <div class="vj-form-group">
              <label for="confirmarSenha">Confirmar senha</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  id="confirmarSenha"
                  name="confirmarSenha"
                  type="password"
                  placeholder="Repita a senha"
                  minlength="6"
                  required
                />
                <button
                  class="vj-eye-btn"
                  type="button"
                  id="toggleConfirmPwd"
                  aria-label="Mostrar/ocultar confirmação"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <small id="confirmarSenhaError" class="vj-error-msg"></small>
            </div>

            <!-- ACEITE -->
            <label class="vj-checkbox">
              <input id="aceite" type="checkbox" required />
              <span>
                Li e concordo com os
                <a href="./termos.html" target="_blank">Termos de Uso</a> e
                <a href="./privacidade.html" target="_blank"
                  >Política de Privacidade</a
                >.
              </span>
            </label>

            <!-- BOTAO -->
            <button class="vj-submit-btn" type="submit">
              Criar conta <span>→</span>
            </button>

            <!-- EXTRA LINK -->
            <div
              class="vj-auth-switch"
              style="
                margin-top: 16px;
                text-align: center;
                font-size: 14px;
                color: #64748b;
              "
            >
              Já tem conta de estabelecimento?
              <a
                href="./parceiro-login.html"
                style="color: #ea580c; font-weight: 600; text-decoration: none"
                >Fazer login</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../js/api.js" defer></script>
    <script src="../js/parceiro-criar-conta.js" defer></script>
    <script src="../js/vlibras.js" defer></script>
  </body>
</html>
