<!DOCTYPE html>
<html lang="pt-br">
<head>
  <style>html,body{background:#f8fafc!important}</style>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pagamento Aprovado • Venha Junto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #475569;
      --heading: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      
      --brand: #ea580c; 
      --brand-hover: #c2410c;
      --green: #10b981; 
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-family);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    a { text-decoration: none; color: inherit; }

    .success-card {
      width: 100%;
      max-width: 540px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.01);
    }
    
    .card-top {
      background-color: #f0fdf4; /* Green tint */
      padding: 40px 30px;
      text-align: center;
      position: relative;
    }
    
    .card-top::after {
      content: "";
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, #dcfce7, transparent);
    }

    .icon-wrapper {
      width: 70px;
      height: 70px;
      background: #fff;
      border-radius: 50%;
      border: 5px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: var(--green);
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      color: var(--heading);
      margin: 0 0 8px;
    }
    
    .card-subtitle {
      font-size: 15px;
      color: var(--muted);
      margin: 0;
    }

    .card-body {
      padding: 30px;
    }

    .welcome-text {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin: 0 0 24px;
    }

    .receipt-box {
      background: #f8fafc;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .receipt-row:last-child {
      margin-bottom: 0;
    }
    .receipt-label {
      color: var(--muted);
    }
    .receipt-value {
      font-weight: 500;
      color: var(--heading);
    }
    .receipt-value.code {
      font-family: monospace;
      letter-spacing: 1px;
      background: #e2e8f0;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
    }

    .btn-dashboard {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(234, 88, 12, 0.2);
      transition: background 0.2s;
    }
    .btn-dashboard:hover {
      background: var(--brand-hover);
    }

    @media (max-width: 500px) {
      .card-body { padding: 20px; }
      .card-top { padding: 30px 20px; }
    }
  </style>
  <script>(function(d){var s = d.createElement('script');s.setAttribute('data-account', 'SEU_ID_AQUI');s.setAttribute('src', 'https://cdn.userway.org/widget.js');(d.body || d.head).appendChild(s);})(document);</script>
</head>
<body>

  <div class="success-card">
    <div class="card-top">
      <div class="icon-wrapper">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h1 class="card-title">Pagamento Aprovado!</h1>
      <p class="card-subtitle">Seu plano foi ativado com sucesso.</p>
    </div>

    <div class="card-body">
      <p class="welcome-text">
        Todos os benefícios do seu novo plano já estão disponíveis. Aproveite!
      </p>

      <div class="receipt-box">
        <div class="receipt-row">
          <span class="receipt-label">Plano</span>
          <span class="receipt-value" id="valPlan">Pro Plus</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-label">Valor</span>
          <span class="receipt-value" id="valPrice">R$ 79.00/mês</span>
        </div>
        <div class="receipt-row">
          <span class="receipt-label">Código da transação</span>
          <span class="receipt-value code" id="valCode">VJ-MNC1WNYA-5QTB</span>
        </div>
      </div>

      <a href="./parceiro-dashboard.html" class="btn-dashboard">
        Ir para o Dashboard
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      </a>
    </div>
  </div>

  <script>
    // Recuperar plano do localstorage pra preencher dinâmico (simulação)
    const storedPlan = localStorage.getItem("vj_checkout_plan");
    if (storedPlan === 'pro') {
      document.getElementById('valPlan').innerText = "Pro";
      document.getElementById('valPrice').innerText = "R$ 39.00/mês";
    }

    // Gerar um código aleatório fofinho de transação pra ficar mais real
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let code = 'VJ-';
    for(let i=0; i<8; i++) {
        if(i===4) code += '-';
        code += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    document.getElementById('valCode').innerText = code;
  </script>
</body>
</html>
