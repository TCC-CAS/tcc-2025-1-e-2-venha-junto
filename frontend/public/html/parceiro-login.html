<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Venha Junto • Login de Parceiro</title>

    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/auth-split.css" />
    <style>
      /* Main Error Styling */
      .vj-main-error {
        display: none;
        background: #fef2f2;
        color: #b91c1c;
        padding: 14px;
        border-radius: 10px;
        border: 1px solid #fca5a5;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 24px;
        align-items: center;
        gap: 10px;
      }
      /* Ajuste de Overflow e Altura Lado Esquerdo */
      .vj-split-layout {
        align-items: stretch;
      }
      .vj-split-left {
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .vj-split-right {
        align-items: flex-start;
        padding-top: 60px;
        padding-bottom: 60px;
      }
      .vj-form-container {
        margin: auto;
      }
      .vj-main-error.show {
        display: flex;
      }

      /* Erros em campos */
      .vj-error-msg {
        display: none;
        color: #ef4444;
        font-size: 13px;
        font-weight: 600;
        margin-top: 6px;
      }
      .vj-error-msg.show {
        display: block;
      }

      .vj-input-wrapper input.invalid {
        border-color: #ef4444;
        background-color: #fef2f2;
      }

      .badge-login {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: #fff7ed;
        color: #c2410c;
        font-size: 13px;
        font-weight: 800;
        padding: 6px 12px;
        border-radius: 999px;
        margin-bottom: 16px;
      }
    </style>
  </head>

  <body>
    <!-- Split Layout Container -->
    <div class="vj-split-layout">
      <!-- Left side: Orange Hero -->
      <div class="vj-split-left">
        <a href="./index.html" class="vj-back-btn" aria-label="Voltar ao início"
          >← Voltar ao início</a
        >
        <div class="vj-split-left-content">
          <h1>Portal do Parceiro</h1>
          <p>Entre para gerenciar seu estabelecimento e ver suas avaliações.</p>
        </div>
      </div>

      <!-- Right side: White Form -->
      <div class="vj-split-right">
        <div class="vj-form-container">
          <div class="badge-login">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            Área do Parceiro
          </div>
          <h2 class="vj-form-title">Acesse sua conta</h2>
          <p class="vj-form-sub">
            Informe seu e-mail corporativo e senha cadastrados.
          </p>

          <form
            id="formLogin"
            class="vj-split-form"
            autocomplete="on"
            novalidate
          >
            <div id="mainError" class="vj-main-error">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <span id="mainErrorText">Mensagem de erro aqui</span>
            </div>

            <!-- EMAIL -->
            <div class="vj-form-group">
              <label for="email">E-mail corporativo</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
                  ></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input
                  id="email"
                  name="email"
                  type="email"
                  placeholder="empresa@exemplo.com"
                  required
                />
              </div>
              <small id="emailError" class="vj-error-msg"></small>
            </div>

            <!-- SENHA -->
            <div class="vj-form-group">
              <label for="senha">Senha</label>
              <div class="vj-input-wrapper">
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect
                    x="3"
                    y="11"
                    width="18"
                    height="11"
                    rx="2"
                    ry="2"
                  ></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input
                  id="senha"
                  name="senha"
                  type="password"
                  placeholder="Digite sua senha"
                  required
                />
                <button
                  class="vj-eye-btn"
                  type="button"
                  id="togglePwd"
                  aria-label="Mostrar/ocultar senha"
                >
                  <svg
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"
                    ></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
              <small id="senhaError" class="vj-error-msg"></small>
            </div>

            <div
              style="
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-top: -4px;
                margin-bottom: 24px;
              "
            >
              <label class="vj-checkbox">
                <input type="checkbox" id="rememberEmail" disabled />
                <span>Lembrar e-mail</span>
              </label>
              <a
                href="./parceiro-criar-conta.html"
                style="
                  color: #ea580c;
                  font-weight: 700;
                  font-size: 14px;
                  text-decoration: none;
                "
                >Esqueci a senha</a
              >
            </div>

            <!-- BOTAO -->
            <button class="vj-submit-btn" type="submit">
              Entrar <span>→</span>
            </button>

            <!-- EXTRA LINK -->
            <div
              class="vj-auth-switch"
              style="
                margin-top: 24px;
                text-align: center;
                font-size: 14px;
                color: #64748b;
                border-top: 1px solid #e2e8f0;
                padding-top: 24px;
              "
            >
              Ainda não anunciou no Venha Junto?
              <a
                href="./parceiro-criar-conta.html"
                style="color: #ea580c; font-weight: 700; text-decoration: none"
                >Cadastrar Conta</a
              >
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- SCRIPTS -->
    <script src="../js/api.js" defer></script>
    <script src="../js/parceiro-login.js" defer></script>
    <script src="../js/vlibras.js" defer></script>
  </body>
</html>
